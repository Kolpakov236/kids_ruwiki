on:
  push:
    - workflows: [deploy-backend]
      filter:
        branches: [main]
        paths: ['backend/**', '.sourcecraft/ci.yaml']

workflows:
  deploy-backend:
    tasks:
      - name: deploy-backend-task
        env:
          SOURCE_PATH: "./backend"
          YC_FUNCTION_NAME: "ruwiki-backend"
          YC_FUNCTION_RUNTIME: "python311"
          YC_FUNCTION_ENTRYPOINT: "app.main.handler"
          YC_FUNCTION_MEMORY: "512m"
          YC_FUNCTION_TIMEOUT: "120s"
          PUBLIC: "true"
        cubes:
          - name: deploy
            env:
              YC_SA_KEY: ${{ secrets.YC_SA_KEY }}
              YC_FOLDER_ID: ${{ secrets.YC_FOLDER_ID }}
              YC_LLM_API_KEY: ${{ secrets.YC_LLM_API_KEY }}
              YC_SECRET_KEY: ${{ secrets.YC_SECRET_KEY }}
            image:
              name: cr.yandex/sourcecraft/yc-cli:latest
              entrypoint: ""
            script:
              - printf '%s' "$YC_SA_KEY" > /tmp/sa-key.json
              - yc config set service-account-key /tmp/sa-key.json
              - yc config set folder-id "$YC_FOLDER_ID"
              - echo "🔐 Auth configured via service account key"
              - |
                if ! yc serverless function get --name="$YC_FUNCTION_NAME" 2>/dev/null; then
                  echo "Function not found, creating..."
                  yc serverless function create --name="$YC_FUNCTION_NAME"
                else
                  echo "Function exists, deploying new version..."
                fi
              - mkdir -p /tmp/fn-src
              - cp -r "$SOURCE_PATH"/. /tmp/fn-src/
              - cp /tmp/fn-src/requirements.cf.txt /tmp/fn-src/requirements.txt
              - |
                yc serverless function version create \
                  --function-name="$YC_FUNCTION_NAME" \
                  --runtime "$YC_FUNCTION_RUNTIME" \
                  --entrypoint "$YC_FUNCTION_ENTRYPOINT" \
                  --memory "$YC_FUNCTION_MEMORY" \
                  --execution-timeout "$YC_FUNCTION_TIMEOUT" \
                  --source-path /tmp/fn-src \
                  --environment RUWIKI_SITE_BASE=https://ruwiki.ru \
                  --environment RUWIKI_REST_API_BASE=https://ruwiki.ru/api/rest_v1 \
                  --environment LLM_PROVIDER=openai_compatible \
                  --environment LLM_MODEL=yandexgpt-5-pro \
                  --environment LLM_BASE_URL=https://llm.api.cloud.yandex.net/v1 \
                  --environment LLM_TIMEOUT_SECONDS=120 \
                  --environment LLM_MAX_INPUT_CHARS=2500 \
                  --environment LLM_TEMPERATURE=0.35 \
                  --environment LLM_NUM_PREDICT=3000 \
                  --environment ENABLE_LLM_REPAIR=true \
                  --environment SQLITE_PATH=/tmp/data/app.db \
                  --environment CHROMA_PATH=/tmp/data/chroma \
                  --environment ENABLE_VECTOR_CACHE=false \
                  --environment "YANDEX_FOLDER_ID=$YC_FOLDER_ID" \
                  --environment "LLM_API_KEY=$YC_LLM_API_KEY" \
                  --environment LLM_FAST_MODEL=deepseek-v4-flash \
                  --environment "SECRET_KEY=$YC_SECRET_KEY"
              - |
                if [ "$PUBLIC" = "true" ]; then
                  yc serverless function allow-unauthenticated-invoke --name="$YC_FUNCTION_NAME"
                  echo "✅ Function is publicly accessible"
                fi
              - |
                FUNCTION_ID=$(yc serverless function get --name="$YC_FUNCTION_NAME" --format=json | jq -r '.id')
                echo "🚀 Deployed! URL: https://functions.yandexcloud.net/$FUNCTION_ID"
