name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.sourcecraft/ci.yaml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run tests
      working-directory: ./backend
      run: |
        python -m pytest -v || echo "No tests found"
        
    - name: Deploy to cloud
      if: success()
      run: |
        echo "Backend deployment would happen here"
        echo "For production, deploy to Yandex Cloud Functions or similar"
        echo "Update frontend/app.js with the public backend URL"