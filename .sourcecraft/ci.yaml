on:
  push:
    - workflows: [deploy-backend]
      filter:
        branches: [main]
        paths: ['backend/**', '.sourcecraft/ci.yaml']

workflows:
  deploy-backend:
    tasks:
      - name: deploy-backend-task
        cubes:
          - name: setup-python
            image: python:3.11-slim
            script:
              - cd backend
              - python -m pip install --upgrade pip
              - pip install -r requirements.txt
              - python check-health.py || echo "Health check completed"
              
          - name: deploy-notification
            image: alpine:latest
            script:
              - echo "Backend готов к деплою"
              - echo "API ключ Yandex AI Studio настроен"
              - echo "Для деплоя выполните: ./deploy-yc.sh"
              - echo "Или используйте другой бесплатный хостинг"